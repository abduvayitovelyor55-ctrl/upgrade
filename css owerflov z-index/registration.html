<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="registration.css">
</head>

<body>
    <div class="main-div">
        <h1 class="welcome">Sign In</h1>
        <label for="">
            <form action="">
                <input class="userame-or-email" id="name" type="text" placeholder="userame or email">
                <label for="name"></label><br>
                <input class="password" id="password" type="password" placeholder="password">
                <label for="password"></label><br>
                <div class="type">
                    <input class="checkbox" type="checkbox">
                    <p class="remember-me">Remember me</p>
                    <p>
                        <a class="forgot-password" href="/forgot-password">Forgot Password?</a>
                    </p>
                </div>
                <button type="submit">
                    Sign In
                </button>
            </form>
        </label>
    </div>
</body>

</html>
