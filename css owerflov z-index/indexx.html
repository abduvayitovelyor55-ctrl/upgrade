<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <header class="main">
        <img class="img_microsoft" src="https://www.logo.wine/a/logo/Microsoft_Store/Microsoft_Store-Logo.wine.svg"
            alt="">
        <h2>Microsoft Bing</h2>
        <div class="link1">
            <img class="img_copilot"
                src="https://its.unc.edu/wp-content/uploads/sites/337/2023/12/Microsoft_365_Copilot_Icon.png" alt="">
            <div class="header2">
                <a href="https://www.bing.com/chat?FORM=hpcodx&intent=bing">Copilot</a>
                <a href="https://www.bing.com/images?FORM=Z9LH">Images</a>
                <a href="https://www.bing.com/videos?FORM=Z9LH1">Video</a>
                <a href="https://www.bing.com/maps?FORM=Z9LH2">Maps</a>
                <a
                    href="https://www.bing.com/news/search?q=Top+stories&nvaug=%5bNewsVertical+Category%3d%22rt_MaxClass%22%5d&FORM=Z9LH3">News</a>
            </div>
            <label for="all"></label>
            <select class="select" name="q" id="all">
                <option value="">...</option>
                <option value="">Translate</option>
                <option value="">MSN</option>
                <option value="">Online Games</option>
                <option value="">Microsoft 365</option>
                <option value="">Get to Know Bing</option>
            </select>
        </div>
        <div class="sign_in">
            <a href="registration.html" target="_blank">Sign in</a>
            <a href="https://www.bing.com/#">Mobile</a>
        </div>
    </header>
    <section>
        <div class="input_main">
            <div class="search_div">
                <img class="search_icon"
                    src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Search_Icon.svg/1200px-Search_Icon.svg.png"
                    alt="">
                <form action="https://www.bing.com/">
                    <select class="search_history" name="" id="">
                        <option value=""></option>
                        <option value="uzbekistan">Uzbekistan</option>
                        <option value="zeekr">Zeekr</option>
                        <option value="baxmal">Baxmal</option>
                        <input type="search">
                    </select>
                </form>
                <img class="microphone_icon" src="https://cdn-icons-png.freepik.com/512/88/88634.png" alt="">
                <img class="camera_icon" src="https://r.bing.com/rp/f21jlSMmEDN43OaavcdaB-7Phq0.svg" alt="">
            </div>
            <div class="copilot_ai_div">
                <img class="copilot_icon"
                    src="https://its.unc.edu/wp-content/uploads/sites/337/2023/12/Microsoft_365_Copilot_Icon.png"
                    alt="">
            </div>  
        </div>
        <div class="main_div">
            <div class="image_create_div">
                <img class="image_create_icon" src="https://static.thenounproject.com/png/7510504-200.png" alt="">
                <a class="image_create_text" href="https://www.bing.com/images/create?bicsource=hp&FORM=bicbhp">
                    Image creator</a>
            </div>
            <div class="video_create_div">
                <img class="video_create_icon"
                    src="https://assets.streamlinehq.com/image/private/w_240,h_240,ar_1/f_auto/v1/icons/spark/ai-generate-video-spark-f5dy1wvij26be41ob8fdc5.png/ai-generate-video-spark-662ttyh11zlupceu7pcyu.png?_a=DATAg1AAZAA0"
                    alt="">
                <a class="video_create_text"
                    href="https://www.bing.com/images/create?ctype=video&bicsource=hp&FORM=bvcbhp">Video creator</a>
            </div>
        </div>
    </section>
</body>

</html>
